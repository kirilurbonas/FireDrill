version: 2
project_name: firedrill

builds:
  - main: ./cmd/firedrill
    binary: firedrill
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/kirilurbonas/FireDrill/pkg/version.Version={{.Version}}

archives:
  - formats: [tar.gz]
    files: [LICENSE, README.md]

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc

# Homebrew tap — enable once a kirilurbonas/homebrew-tap repo exists:
# brews:
#   - repository: { owner: kirilurbonas, name: homebrew-tap }
