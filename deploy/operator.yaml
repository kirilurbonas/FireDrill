# FireDrill operator: runs scheduled recovery drills declared as
# RecoveryDrill resources. Apply deploy/crd.yaml first.
apiVersion: v1
kind: Namespace
metadata:
  name: firedrill-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: firedrill-operator
  namespace: firedrill-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: firedrill-operator
rules:
  - apiGroups: [firedrill.dev]
    resources: [recoverydrills]
    verbs: [get, list, watch]
  - apiGroups: [firedrill.dev]
    resources: [recoverydrills/status]
    verbs: [get, update, patch]
  # Sandboxes: pods in the sandbox namespace(s), plus namespace/networkpolicy bootstrap.
  # NOTE: these pod permissions are cluster-wide because drills may set any
  # sandbox.namespace. To least-privilege this, replace the ClusterRoleBinding
  # with RoleBindings in the specific namespaces your drills use.
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch, create, delete]
  - apiGroups: [""]
    resources: [pods/exec, pods/portforward]
    verbs: [create]
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list, create, delete] # delete: velero-drill ephemeral namespaces + gc
  - apiGroups: [networking.k8s.io]
    resources: [networkpolicies]
    verbs: [get, create, delete]
  # The new events API (client-go tools/events) writes events.k8s.io/v1;
  # core "" is kept for tooling that still reads legacy events.
  - apiGroups: ["", events.k8s.io]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, create, update] # leader election
  - apiGroups: [velero.io]
    resources: [restores, backups]
    verbs: [get, list, create, delete] # velero drills + gc of leftover restores
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: firedrill-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: firedrill-operator
subjects:
  - kind: ServiceAccount
    name: firedrill-operator
    namespace: firedrill-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firedrill-operator
  namespace: firedrill-system
  labels: { app: firedrill-operator }
spec:
  replicas: 1
  selector:
    matchLabels: { app: firedrill-operator }
  template:
    metadata:
      labels: { app: firedrill-operator }
    spec:
      serviceAccountName: firedrill-operator
      containers:
        - name: operator
          image: ghcr.io/kirilurbonas/firedrill:latest  # published by the release workflow; pin a version tag in production
          args: [operator]
          ports:
            - { containerPort: 8080, name: metrics }
            - { containerPort: 8081, name: health }
          readinessProbe:
            httpGet: { path: /readyz, port: health }
          livenessProbe:
            httpGet: { path: /healthz, port: health }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: "1", memory: 512Mi }
          volumeMounts:
            - { name: evidence, mountPath: /evidence }
            - { name: tmp, mountPath: /tmp }
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
            seccompProfile: { type: RuntimeDefault }
      volumes:
        # WARNING: emptyDir means signed evidence is LOST when the pod
        # restarts. For production, replace with a PVC (below) or rely on
        # report.sinks to export results.
        - name: evidence
          emptyDir: {}
        # - name: evidence
        #   persistentVolumeClaim:
        #     claimName: firedrill-evidence
        - name: tmp
          emptyDir: {}
