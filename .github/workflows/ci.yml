name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          args: --build-tags e2e

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test ./... -count=1 -race -coverprofile=coverage.out
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test ./pkg/spec -fuzz=FuzzParseAll -fuzztime=30s

  e2e:
    runs-on: ubuntu-latest # docker preinstalled — dogfoods a real restore
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: helm/kind-action@v1 # kubernetes sandbox + operator e2e
        with:
          cluster_name: firedrill-ci
      - name: Install velero CLI
        run: |
          curl -sL https://github.com/vmware-tanzu/velero/releases/download/v1.18.2/velero-v1.18.2-linux-amd64.tar.gz \
            | tar xz && sudo mv velero-v1.18.2-linux-amd64/velero /usr/local/bin/
      - name: Set up Velero + demo backup (for the velero e2e)
        run: ./examples/velero/setup-velero-kind.sh
      - run: make e2e
